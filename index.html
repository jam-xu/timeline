<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frise Chronologique</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --purple-800:#3C3489;
  --purple-600:#534AB7;
  --bg:#FAFAF8;
  --surface:#FFFFFF;
  --border:rgba(0,0,0,0.1);
  --text-primary:#1A1A18;
  --text-secondary:#5F5E5A;
  --text-hint:#888780;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: var(--bg); color: var(--text-primary); }
header { background: var(--purple-800); color: #fff; padding: 1.5rem 2rem; }
header h1 { font-size: 22px; margin-bottom: 4px; }
header p { font-size: 13px; opacity: 0.75; }
.header-row { display: flex; justify-content: space-between; align-items: center; }
.btn-hdr { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-left: 6px; }
.btn-hdr:hover { background: rgba(255,255,255,0.25); }
main { max-width: 860px; margin: 0 auto; padding: 2rem; }
.auth-modal { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
.auth-modal.hidden { display: none; }
.auth-box { background: var(--surface); padding: 2rem; border-radius: 10px; width: 100%; max-width: 380px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
.auth-box h2 { font-size: 18px; margin-bottom: 1.5rem; }
.auth-field { margin-bottom: 1rem; }
.auth-field label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-hint); margin-bottom: 6px; }
.auth-field input { width: 100%; padding: 10px; font-size: 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); }
.auth-field input:focus { border-color: var(--purple-600); outline: none; box-shadow: 0 0 0 2px rgba(83, 74, 183, 0.1); }
.auth-error { background: #FCEBEB; color: #A32D2D; padding: 10px; border-radius: 6px; font-size: 12px; margin-bottom: 1rem; display: none; }
.auth-error.show { display: block; }
.auth-btn { width: 100%; padding: 10px; font-size: 13px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; margin-bottom: 8px; }
.auth-btn.primary { background: var(--purple-800); color: #fff; }
.auth-btn.primary:hover { background: var(--purple-600); }
.auth-link { text-align: center; font-size: 12px; color: var(--text-hint); margin-top: 8px; }
.auth-link button { background: none; border: none; color: var(--purple-600); cursor: pointer; text-decoration: underline; font-size: 12px; }
.add-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.5rem; margin-bottom: 2rem; }
.add-panel h2 { font-size: 15px; margin-bottom: 1rem; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
label { display: block; font-size: 11px; text-transform: uppercase; color: var(--text-hint); margin-bottom: 4px; }
input[type=text], textarea, select { width: 100%; padding: 8px; font-size: 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); }
input[type=text]:focus, textarea:focus, select:focus { border-color: var(--purple-600); outline: none; }
textarea { min-height: 64px; }
.form-actions { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end; }
.btn { padding: 8px 16px; font-size: 13px; border-radius: 6px; cursor: pointer; border: none; }
.btn-primary { background: var(--purple-800); color: #fff; }
.btn-primary:hover { background: var(--purple-600); }
.btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
.btn-secondary:hover { background: var(--bg); }
.toolbar { display: flex; gap: 8px; margin-bottom: 1.5rem; align-items: center; }
.timeline { position: relative; padding-left: 40px; }
.event-row { margin-bottom: 1.5rem; position: relative; }
.event-dot { position: absolute; left: -30px; top: 10px; width: 12px; height: 12px; border-radius: 50%; background: #534AB7; }
.event-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; }
.event-card:hover { border-color: var(--text-secondary); }
.event-top { display: flex; justify-content: space-between; align-items: start; }
.event-title { font-size: 15px; font-weight: 700; }
.event-date { font-size: 11px; background: #EEEDFE; color: var(--purple-800); padding: 3px 8px; border-radius: 4px; }
.event-desc { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }
.icon-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 4px; }
.icon-btn:hover { background: var(--bg); border-radius: 4px; }
.empty-state { text-align: center; padding: 3rem; color: var(--text-hint); }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--purple-800); color: #fff; padding: 10px 20px; border-radius: 8px; z-index: 999; opacity: 0; transition: opacity 0.3s; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="auth-modal" id="auth-modal">
  <div class="auth-box">
    <h2 id="auth-title">Connexion</h2>
    <div class="auth-error" id="auth-error"></div>
    
    <div id="login-form">
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="vous@example.com">
      </div>
      <div class="auth-field">
        <label>Mot de passe</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="auth-btn primary" onclick="handleLogin()">Se connecter</button>
      <div class="auth-link">
        Pas encore inscrit ? <button onclick="switchToSignup()">Créer un compte</button>
      </div>
      <div class="auth-link">
        <button onclick="switchToForgot()">Mot de passe oublié ?</button>
      </div>
    </div>

    <div id="signup-form" style="display: none;">
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="vous@example.com">
      </div>
      <div class="auth-field">
        <label>Mot de passe</label>
        <input type="password" id="signup-password" placeholder="••••••••">
      </div>
      <div class="auth-field">
        <label>Confirmer</label>
        <input type="password" id="signup-confirm" placeholder="••••••••">
      </div>
      <button class="auth-btn primary" onclick="handleSignup()">Créer un compte</button>
      <div class="auth-link">
        Déjà inscrit ? <button onclick="switchToLogin()">Se connecter</button>
      </div>
    </div>

    <div id="forgot-form" style="display: none;">
      <div class="auth-field">
        <label>Email</label>
        <input type="email" id="forgot-email" placeholder="vous@example.com">
      </div>
      <button class="auth-btn primary" onclick="handleForgot()">Envoyer le lien</button>
      <div class="auth-link">
        <button onclick="switchToLogin()">Retour</button>
      </div>
    </div>
  </div>
</div>

<header>
  <div class="header-row">
    <div>
      <h1>📜 Frise chronologique — Histoire</h1>
      <p>Sec 3 & Sec 4 · Préparation à l'examen du ministère</p>
    </div>
    <div>
      <button class="btn-hdr" id="user-btn" onclick="showUserMenu()">👤 Connexion</button>
      <button class="btn-hdr" onclick="exportJSON()">Exporter</button>
      <button class="btn-hdr" onclick="document.getElementById('import-file').click()">Importer</button>
      <input type="file" id="import-file" accept=".json" onchange="importJSON(event)" style="display:none;">
    </div>
  </div>
</header>

<main>
  <div class="add-panel" id="add-panel" style="display:none;">
    <h2>Ajouter un événement</h2>
    <div class="form-grid">
      <div>
        <label>Date</label>
        <input type="text" id="inp-date" placeholder="1867">
      </div>
      <div>
        <label>Titre</label>
        <input type="text" id="inp-title" placeholder="Titre">
      </div>
    </div>
    <div>
      <label>Description</label>
      <textarea id="inp-desc" placeholder="Détails..."></textarea>
    </div>
    <div class="form-grid">
      <div>
        <label>Catégorie</label>
        <select id="inp-cat">
          <option value="autre">Autre</option>
          <option value="politique">Politique</option>
          <option value="social">Social</option>
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="cancelAdd()">Annuler</button>
      <button class="btn btn-primary" onclick="addEvent()">Ajouter</button>
    </div>
  </div>

  <div class="timeline" id="timeline">
    <div class="empty-state">📭 Connectez-vous pour commencer</div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ============================================
// CONFIGURATION - UPDATE THESE TWO LINES ONLY
// ============================================
const SUPABASE_URL = 'https://rltxdbjioopgzqqlzfxk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsdHhkYmppb29wZ3pxcWx6ZnhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyOTExMzMsImV4cCI6MjA5ODg2NzEzM30.hHfZAmYS31WyMiJdcn9K7zfzPAqL1J8uDnuzn4WqbvE';

// Initialize Supabase
const { createClient } = window.supabase;
let sb = null;
let currentUser = null;
let events = [];

try {
  sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  console.log('✓ Supabase initialized');
} catch(e) {
  console.error('✗ Supabase error:', e);
  showToast('⚠️ Configuration error');
}

// ============================================
// AUTH FUNCTIONS
// ============================================

function switchToLogin() {
  document.getElementById('login-form').style.display = 'block';
  document.getElementById('signup-form').style.display = 'none';
  document.getElementById('forgot-form').style.display = 'none';
  document.getElementById('auth-title').textContent = 'Connexion';
}

function switchToSignup() {
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('signup-form').style.display = 'block';
  document.getElementById('forgot-form').style.display = 'none';
  document.getElementById('auth-title').textContent = 'Créer un compte';
}

function switchToForgot() {
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('signup-form').style.display = 'none';
  document.getElementById('forgot-form').style.display = 'block';
  document.getElementById('auth-title').textContent = 'Réinitialiser';
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

async function handleLogin() {
  if (!sb) { showAuthError('Not configured'); return; }
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showAuthError('Remplissez tous les champs'); return; }
  
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) showAuthError(error.message);
    else {
      currentUser = data.user;
      closeAuthModal();
      updateHeader();
      loadEvents();
    }
  } catch(e) {
    showAuthError(e.message);
  }
}

async function handleSignup() {
  if (!sb) { showAuthError('Not configured'); return; }
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const confirm = document.getElementById('signup-confirm').value;
  
  if (!email || !password || !confirm) { showAuthError('Remplissez tous les champs'); return; }
  if (password !== confirm) { showAuthError('Les mots de passe ne correspondent pas'); return; }
  if (password.length < 6) { showAuthError('Minimum 6 caractères'); return; }
  
  try {
    const { data, error } = await sb.auth.signUp({ email, password });
    if (error) showAuthError(error.message);
    else {
      showToast('✅ Compte créé !');
      setTimeout(() => switchToLogin(), 1500);
    }
  } catch(e) {
    showAuthError(e.message);
  }
}

async function handleForgot() {
  if (!sb) { showAuthError('Not configured'); return; }
  const email = document.getElementById('forgot-email').value.trim();
  if (!email) { showAuthError('Entrez votre email'); return; }
  
  try {
    const { error } = await sb.auth.resetPasswordForEmail(email);
    if (error) showAuthError(error.message);
    else {
      showToast('✅ Lien envoyé !');
      setTimeout(() => switchToLogin(), 1500);
    }
  } catch(e) {
    showAuthError(e.message);
  }
}

function closeAuthModal() {
  document.getElementById('auth-modal').classList.add('hidden');
}

function openAuthModal() {
  document.getElementById('auth-modal').classList.remove('hidden');
  switchToLogin();
}

function updateHeader() {
  const btn = document.getElementById('user-btn');
  if (currentUser) {
    btn.textContent = `👤 ${currentUser.email.split('@')[0]}`;
    document.getElementById('add-panel').style.display = 'block';
  } else {
    btn.textContent = '👤 Connexion';
    document.getElementById('add-panel').style.display = 'none';
  }
}

function showUserMenu() {
  if (currentUser) {
    if (confirm(`Déconnexion de ${currentUser.email} ?`)) {
      sb.auth.signOut();
      currentUser = null;
      events = [];
      updateHeader();
      render();
      openAuthModal();
      showToast('✅ Déconnecté');
    }
  } else {
    openAuthModal();
  }
}

// ============================================
// TIMELINE FUNCTIONS
// ============================================

async function loadEvents() {
  if (!currentUser || !sb) return;
  try {
    const { data, error } = await sb
      .from('events')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('sort_key', { ascending: true });
    if (error) {
      console.error('Load error:', error);
    } else {
      events = (data || []).map(e => ({
        id: e.id,
        date: e.date,
        title: e.title,
        desc: e.description,
        sortKey: e.sort_key
      }));
      render();
    }
  } catch(e) {
    console.error('Load exception:', e);
  }
}

async function addEvent() {
  if (!currentUser || !sb) { openAuthModal(); return; }
  const date = document.getElementById('inp-date').value.trim();
  const title = document.getElementById('inp-title').value.trim();
  const desc = document.getElementById('inp-desc').value.trim();
  const cat = document.getElementById('inp-cat').value;
  
  if (!date || !title) { alert('Date et titre requis'); return; }
  
  const sortKey = parseInt(date.match(/\d+/)?.[0] || 0) * 10000;
  
  try {
    const { error } = await sb.from('events').insert([{
      user_id: currentUser.id,
      date,
      title,
      description: desc,
      category: cat,
      unit: 'u1',
      sort_key: sortKey
    }]);
    if (error) alert('Erreur: ' + error.message);
    else {
      document.getElementById('inp-date').value = '';
      document.getElementById('inp-title').value = '';
      document.getElementById('inp-desc').value = '';
      loadEvents();
      showToast('✅ Événement ajouté');
    }
  } catch(e) {
    alert('Erreur: ' + e.message);
  }
}

async function deleteEvent(id) {
  if (!currentUser || !sb) return;
  if (!confirm('Supprimer ?')) return;
  try {
    await sb.from('events').delete().eq('id', id).eq('user_id', currentUser.id);
    loadEvents();
    showToast('✅ Supprimé');
  } catch(e) {
    alert('Erreur: ' + e.message);
  }
}

function cancelAdd() {
  document.getElementById('inp-date').value = '';
  document.getElementById('inp-title').value = '';
  document.getElementById('inp-desc').value = '';
}

function render() {
  const timeline = document.getElementById('timeline');
  if (!currentUser) {
    timeline.innerHTML = '<div class="empty-state">🔒 Connectez-vous pour voir vos événements</div>';
    return;
  }
  if (events.length === 0) {
    timeline.innerHTML = '<div class="empty-state">📭 Aucun événement</div>';
    return;
  }
  timeline.innerHTML = events.map(e => `
    <div class="event-row">
      <div class="event-dot"></div>
      <div class="event-card">
        <div class="event-top">
          <div>
            <div class="event-date">${e.date}</div>
            <div class="event-title">${e.title}</div>
            ${e.desc ? `<div class="event-desc">${e.desc}</div>` : ''}
          </div>
          <button class="icon-btn" onclick="deleteEvent(${e.id})">🗑️</button>
        </div>
      </div>
    </div>
  `).join('');
}

function exportJSON() {
  if (!currentUser) { alert('Connectez-vous'); return; }
  const blob = new Blob([JSON.stringify({ events })], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'frise_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  showToast('✅ Exporté');
}

function importJSON(evt) {
  if (!currentUser || !sb) { alert('Connectez-vous'); evt.target.value = ''; return; }
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const data = JSON.parse(e.target.result);
      const imported = data.events || data;
      if (!Array.isArray(imported)) throw new Error('Invalid format');
      if (!confirm(`Importer ${imported.length} événement(s) ?`)) return;
      for (const ev of imported) {
        const sortKey = parseInt(String(ev.date).match(/\d+/)?.[0] || 0) * 10000;
        await sb.from('events').insert([{
          user_id: currentUser.id,
          date: ev.date || '',
          title: ev.title || '',
          description: ev.desc || '',
          category: ev.cat || 'autre',
          unit: 'u1',
          sort_key: sortKey
        }]);
      }
      loadEvents();
      showToast('✅ Importé');
    } catch(err) {
      alert('Erreur: ' + err.message);
    }
    evt.target.value = '';
  };
  reader.readAsText(file);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ============================================
// INITIALIZATION
// ============================================

async function init() {
  if (!sb) { showToast('⚠️ Not configured'); return; }
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      currentUser = session.user;
      updateHeader();
      loadEvents();
    } else {
      openAuthModal();
    }
    sb.auth.onAuthStateChange((event, session) => {
      if (session) {
        currentUser = session.user;
        updateHeader();
        loadEvents();
      } else {
        currentUser = null;
        updateHeader();
      }
    });
  } catch(e) {
    console.error('Init error:', e);
  }
}

init();
</script>
</body>
</html>
